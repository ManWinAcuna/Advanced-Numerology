<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>UFC - Sports Betting</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page ufc-page">

  <nav class="topnav">
    <a href="profile.html" class="nav-link">My Profile</a>
    <a href="calculator.html" class="nav-link">Calculator</a>
    <a href="famous.html" class="nav-link">Famous Lookup</a>
    <a href="calendar.html" class="nav-link">Calendar</a>
    <a href="astrology.html" class="nav-link">Astrology</a>
    <a href="database.html" class="nav-link">Database</a>
    <a href="compatibility.html" class="nav-link">Compatibility Calculator</a>
    <a href="sports-betting.html" class="nav-link active">Sports Betting</a>
  </nav>
  <script src="nav-scroll.js"></script>

  <div class="topbar">
    <a href="sports-betting.html" class="back-link">&larr; Sports Betting</a>
  </div>

  <div class="ufc-header-row">
    <h1 class="page-title">🥊 UFC</h1>
    <a href="polymarket-ufc.html?from=ufc" class="btn pm-tracker-btn">🐋 Polymarket</a>
  </div>

  <div class="compat-form active ufc-form">

    <div class="ufc-top-row">
      <div class="box match-date-box">
        <div class="box-label">Fight Date</div>
        <div class="inline-form">
          <input type="text" id="matchDate" inputmode="numeric" placeholder="MM/DD/YYYY" maxlength="10" autocomplete="off">
          <button class="btn" id="todayBtn">Today</button>
        </div>
      </div>

      <div class="box ufc-add-fighter-box">
        <div class="box-label" id="fighterFormLabel">Add Fighter</div>
        <button class="btn" id="showAddFighterBtn" type="button">+ Add New Fighter</button>
        <div class="ufc-add-fighter-form" id="addFighterForm">
          <input type="text" id="newFighterName" placeholder="Fighter name">
          <input type="text" id="newFighterDob" inputmode="numeric" placeholder="MM/DD/YYYY" maxlength="10" autocomplete="off">
          <div class="famous-status" id="fighterDobStatus"></div>
          <button class="btn" id="saveFighterBtn" type="button">Save Fighter</button>
          <button class="btn-link" id="cancelFighterBtn" type="button">Cancel</button>
          <button class="btn-link btn-link-danger" id="deleteFighterBtn" type="button" style="display:none;">Delete Fighter</button>
        </div>
      </div>
    </div>

    <div class="box ufc-location-box">
      <div class="box-label">Fight Location</div>
      <div class="hours-toggle ufc-region-toggle" id="regionToggle">
        <button type="button" class="hours-toggle-btn active" data-region="us">🇺🇸 United States</button>
        <button type="button" class="hours-toggle-btn" data-region="intl">🌍 International</button>
      </div>
      <div class="ufc-location-grid">
        <div class="ufc-location-field">
          <label for="stateSelect" id="regionLabel">State</label>
          <div class="ufc-select-row">
            <select id="stateSelect">
              <option value="">Select state...</option>
            </select>
            <button class="btn-link" id="editRegionBtn" type="button" style="display:none;">Edit</button>
          </div>
        </div>
        <div class="ufc-location-field">
          <label for="stadiumSelect">Stadium / Venue <span class="optional-tag">optional</span></label>
          <div class="ufc-select-row">
            <select id="stadiumSelect">
              <option value="">Select stadium...</option>
            </select>
            <button class="btn-link" id="editStadiumBtn" type="button" style="display:none;">Edit</button>
          </div>
        </div>
      </div>
      <div class="ufc-add-stadium-form" id="addRegionForm">
        <div class="ufc-form-sublabel" id="regionFormLabel">Add New City / Region</div>
        <input type="text" id="newRegionName" placeholder="City / region name (e.g., Abu Dhabi)">
        <input type="text" id="newRegionFounded" inputmode="numeric" placeholder="MM/DD/YYYY" maxlength="10" autocomplete="off" title="Founding date">
        <button class="btn" id="saveRegionBtn" type="button">Save Region</button>
        <button class="btn-link" id="cancelRegionBtn" type="button">Cancel</button>
      </div>
      <div class="ufc-add-stadium-form" id="addStadiumForm">
        <div class="ufc-form-sublabel" id="stadiumFormLabel">Add New Stadium</div>
        <input type="text" id="newStadiumName" placeholder="Stadium name">
        <input type="text" id="newStadiumFounded" inputmode="numeric" placeholder="MM/DD/YYYY" maxlength="10" autocomplete="off" title="Founding date">
        <select id="newStadiumState">
          <option value="">Select state...</option>
        </select>
        <button class="btn" id="saveStadiumBtn" type="button">Save Stadium</button>
        <button class="btn-link" id="cancelStadiumBtn" type="button">Cancel</button>
      </div>
    </div>

    <div class="player-inputs">
      <div class="player-input box" data-player="A">
        <div class="box-label">Fighter A</div>
        <div class="player-search-wrap" data-player="A">
          <input type="text" class="player-search" data-player="A" placeholder="Search fighter name..." autocomplete="off">
          <div class="player-suggestions" data-player="A"></div>
        </div>
        <div class="player-selected" data-player="A">
          <div class="player-selected-info">
            <span class="player-selected-name"></span>
            <span class="player-selected-dob"></span>
          </div>
          <div class="player-selected-actions">
            <button class="btn-link player-edit" data-player="A" type="button" style="display:none;">Edit</button>
            <button class="icon-btn player-clear" data-player="A" title="Clear">&times;</button>
          </div>
        </div>
      </div>

      <div class="player-input box" data-player="B">
        <div class="box-label">Fighter B</div>
        <div class="player-search-wrap" data-player="B">
          <input type="text" class="player-search" data-player="B" placeholder="Search fighter name..." autocomplete="off">
          <div class="player-suggestions" data-player="B"></div>
        </div>
        <div class="player-selected" data-player="B">
          <div class="player-selected-info">
            <span class="player-selected-name"></span>
            <span class="player-selected-dob"></span>
          </div>
          <div class="player-selected-actions">
            <button class="btn-link player-edit" data-player="B" type="button" style="display:none;">Edit</button>
            <button class="icon-btn player-clear" data-player="B" title="Clear">&times;</button>
          </div>
        </div>
      </div>
    </div>

    <div class="ufc-calculate-row">
      <button class="btn btn-large" id="calculateBtn">Calculate Matchup</button>
      <button class="btn-link" id="clearFightersBtn" type="button">Clear Fighters</button>
    </div>
  </div>

  <div class="compat-results ufc-results" id="ufcResults">
    <div class="edge-banner" id="edgeBanner"></div>
    <div class="matchup-grid">
      <div class="matchup-side">
        <h3 id="matchupTitleA"></h3>
        <div id="resultA"></div>
      </div>
      <div class="matchup-side">
        <h3 id="matchupTitleB"></h3>
        <div id="resultB"></div>
      </div>
    </div>
  </div>

</div>

<script src="astronomy.browser.min.js"></script>
<script src="astro-engine.js"></script>
<script src="numerology.js"></script>
<script src="compat-data.js"></script>
<script src="compat-engine.js"></script>
<script src="db-core.js"></script>
<script src="firebase-loader.js"></script>
<script src="compat-render.js"></script>
<script src="ufc-data.js"></script>
<script src="us-states-data.js"></script>
<script src="ufc.js"></script>
</body>
</html>
